name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: GOFLAGS=-mod=readonly go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist pkg
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          name="aioproxy_${{ matrix.goos }}_${{ matrix.goarch }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "pkg/aioproxy${ext}" ./cmd/aioproxy
          cp README.md pkg/
          cp -r examples docs deploy pkg/
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd pkg && zip -qr "../dist/${name}.zip" .)
            (cd dist && sha256sum "${name}.zip" > "${name}.zip.sha256")
          else
            tar -C pkg -czf "dist/${name}.tar.gz" .
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: aioproxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect checksums
        run: |
          mkdir -p release
          find artifacts -type f -maxdepth 3 -print -exec cp {} release/ \;
          (cd release && cat *.sha256 > checksums.txt)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
