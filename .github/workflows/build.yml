name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          name="aioproxy_${{ matrix.goos }}_${{ matrix.goarch }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "dist/${name}${ext}" ./cmd/aioproxy
          (cd dist && sha256sum "${name}${ext}" > "${name}.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: aioproxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect
        run: |
          mkdir -p release
          find artifacts -type f -maxdepth 3 -print -exec cp {} release/ \;
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
