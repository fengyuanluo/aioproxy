name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write


jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: GOFLAGS=-mod=readonly go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Build and package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist pkg
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          name="aioproxy_${{ matrix.goos }}_${{ matrix.goarch }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "pkg/aioproxy${ext}" ./cmd/aioproxy
          cp README.md pkg/
          cp -r examples docs deploy pkg/
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd pkg && zip -qr "../dist/${name}.zip" .)
            (cd dist && sha256sum "${name}.zip" > "${name}.zip.sha256")
          else
            tar -C pkg -czf "dist/${name}.tar.gz" .
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi
      - name: Verify packaged outputs
        shell: bash
        run: |
          set -euo pipefail
          ls -lh dist
          test -n "$(find dist -maxdepth 1 -type f | head -n 1)"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Build release bundles
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          for spec in             "linux amd64"             "linux arm64"             "darwin amd64"             "darwin arm64"             "windows amd64"             "windows arm64"
          do
            set -- $spec
            goos=$1
            goarch=$2
            workdir=$(mktemp -d)
            ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi
            name="aioproxy_${goos}_${goarch}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o "$workdir/aioproxy${ext}" ./cmd/aioproxy
            cp README.md "$workdir/"
            cp -r examples docs deploy "$workdir/"
            if [ "$goos" = "windows" ]; then
              (cd "$workdir" && zip -qr "$GITHUB_WORKSPACE/release/${name}.zip" .)
              (cd release && sha256sum "${name}.zip" > "${name}.zip.sha256")
            else
              tar -C "$workdir" -czf "release/${name}.tar.gz" .
              (cd release && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
            fi
            rm -rf "$workdir"
          done
          (cd release && cat *.sha256 > checksums.txt)
          ls -lh release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
